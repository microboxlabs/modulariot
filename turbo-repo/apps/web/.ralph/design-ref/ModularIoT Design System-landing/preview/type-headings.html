<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:flex;flex-direction:column;gap:16px;">
    <div style="display:flex;align-items:baseline;gap:16px;">
      <span style="font-family:'Oswald',sans-serif;font-weight:900;font-size:52px;line-height:1;letter-spacing:.02em;text-transform:uppercase;color:#262626;">MINTRAL</span>
      <span style="font-size:11px;color:var(--fg-3);font-family:var(--font-mono);">Display · Havelock/Oswald 900 · 72px</span>
    </div>
    <div style="display:flex;align-items:baseline;gap:16px;">
      <span style="font-family:'Inter';font-weight:700;font-size:36px;line-height:1.15;letter-spacing:-0.01em;color:#111928;">H1 — Confirm delivery</span>
      <span style="font-size:11px;color:var(--fg-3);font-family:var(--font-mono);">Inter 700 · 36/1.15</span>
    </div>
    <div style="display:flex;align-items:baseline;gap:16px;">
      <span style="font-family:'Inter';font-weight:700;font-size:30px;line-height:1.15;color:#111928;">H2 — Driver / Transport Validation</span>
      <span style="font-size:11px;color:var(--fg-3);font-family:var(--font-mono);">Inter 700 · 30</span>
    </div>
    <div style="display:flex;align-items:baseline;gap:16px;">
      <span style="font-family:'Inter';font-weight:600;font-size:24px;line-height:1.3;color:#111928;">H3 — Mission Control</span>
      <span style="font-size:11px;color:var(--fg-3);font-family:var(--font-mono);">Inter 600 · 24</span>
    </div>
    <div style="display:flex;align-items:baseline;gap:16px;">
      <span style="font-family:'Inter';font-weight:600;font-size:20px;line-height:1.3;color:#111928;">H4 — Trip started</span>
      <span style="font-size:11px;color:var(--fg-3);font-family:var(--font-mono);">Inter 600 · 20</span>
    </div>
  </div>
</div>
</body></html>
