<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:grid;grid-template-columns:repeat(9, 1fr);gap:4px;">
    <div class="swatch light" style="background:#EBF5FF;height:60px;"><span class="hex">50</span></div>
    <div class="swatch light" style="background:#E1EFFE;height:60px;"><span class="hex">100</span></div>
    <div class="swatch light" style="background:#C3DDFD;height:60px;"><span class="hex">200</span></div>
    <div class="swatch light" style="background:#A4CAFE;height:60px;"><span class="hex">300</span></div>
    <div class="swatch" style="background:#76A9FA;height:60px;"><span class="hex">400</span></div>
    <div class="swatch" style="background:#3F83F8;height:60px;"><span class="hex">500</span></div>
    <div class="swatch" style="background:#1C64F2;height:60px;"><span class="hex">600</span></div>
    <div class="swatch" style="background:#1A56DB;height:60px;"><span class="hex">700</span></div>
    <div class="swatch" style="background:#233876;height:60px;"><span class="hex">900</span></div>
  </div>
  <div style="margin-top:10px;display:flex;justify-content:space-between;font-size:12px;color:var(--fg-3);">
    <span>Flowbite blue ramp</span>
    <span>Primary CTA = <strong style="color:#1C64F2">600</strong> · Hover = <strong style="color:#1A56DB">700</strong></span>
  </div>
</div>
</body></html>
