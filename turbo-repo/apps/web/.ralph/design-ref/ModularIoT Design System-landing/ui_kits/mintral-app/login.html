<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Mintral — Sign in</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body, #root { height: 100%; margin: 0; }
  body { font-family: Inter, sans-serif; background: #F9FAFB; overflow: hidden; color: #111928; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="atoms.jsx"></script>
<script type="text/babel">
const { useState } = React;

function Login() {
  const [mode, setMode] = useState("social");  // "social" | "sso" | "password"
  const [err, setErr] = useState(false);
  const [team, setTeam] = useState("");

  return (
    <div data-screen-label="Mintral — Login" style={{
      display: "flex", flexDirection: "column",
      height: "100vh", background: "#F9FAFB",
    }}>
      {/* TOP — logo bar, white */}
      <header style={{
        background: "#fff", borderBottom: "1px solid #E5E7EB",
        padding: "20px 40px", display: "flex", alignItems: "center",
      }}>
        <img src="../../assets/logo-mintral.png" style={{ height: 36 }}/>
      </header>

      {/* BODY — centered card on gray-50 */}
      <main style={{
        flex: 1, display: "flex", alignItems: "center", justifyContent: "center",
        padding: "40px 24px",
      }}>
        <div style={{
          width: 440, background: "#fff",
          border: "1px solid #E5E7EB", borderRadius: 8,
          padding: "40px 40px 32px",
        }}>
          <h1 style={{ fontSize: 24, fontWeight: 700, color: "#111928", margin: "0 0 6px", letterSpacing: "-0.01em" }}>
            Bienvenido de nuevo
          </h1>
          <p style={{ fontSize: 13, color: "#6B7280", margin: "0 0 28px", lineHeight: 1.5 }}>
            Inicia sesión en tu cuenta de Mintral.
          </p>

          {mode === "social" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <Button variant="secondary" size="lg">
                <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.6 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.4 6.2 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.4 6.2 29.5 4 24 4 16.1 4 9.3 8.5 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.4 0 10.3-2.1 14-5.5l-6.5-5.5C29.3 34.6 26.8 36 24 36c-5.2 0-9.6-3.4-11.2-8.1l-6.6 5.1C9.2 39.5 16 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.1-2.1 3.9-3.9 5.2l6.5 5.5c-.5.4 6.1-4.4 6.1-12.8 0-1.3-.1-2.6-.4-3.8z"/></svg>
                Continuar con Google
              </Button>
              <Button variant="secondary" size="lg">
                <svg width="18" height="18" viewBox="0 0 23 23" fill="#5B6770"><path d="M0 0h11v11H0z"/><path d="M12 0h11v11H12z"/><path d="M0 12h11v11H0z"/><path d="M12 12h11v11H12z"/></svg>
                Continuar con Microsoft
              </Button>
              <Button variant="secondary" size="lg">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="#111928"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.1.79-.25.79-.56 0-.28-.01-1.02-.02-2-3.2.7-3.87-1.54-3.87-1.54-.53-1.34-1.29-1.7-1.29-1.7-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.77 2.71 1.26 3.37.96.1-.75.4-1.26.73-1.55-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.47.11-3.06 0 0 .97-.31 3.18 1.18a11 11 0 015.79 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.77.12 3.06.74.81 1.18 1.84 1.18 3.1 0 4.42-2.69 5.39-5.25 5.67.41.35.78 1.05.78 2.11 0 1.52-.01 2.75-.01 3.12 0 .31.21.67.8.56A11.51 11.51 0 0023.5 12C23.5 5.65 18.35.5 12 .5z"/></svg>
                Continuar con GitHub
              </Button>

              <div style={{ display: "flex", alignItems: "center", gap: 12, margin: "8px 0 2px" }}>
                <div style={{ flex: 1, height: 1, background: "#E5E7EB" }}/>
                <span style={{ fontSize: 11, color: "#9CA3AF", textTransform: "uppercase", letterSpacing: "0.08em" }}>o</span>
                <div style={{ flex: 1, height: 1, background: "#E5E7EB" }}/>
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: 8, alignItems: "center", fontSize: 13 }}>
                <a href="#" onClick={(e) => { e.preventDefault(); setMode("sso"); }} style={{ color: "#1C64F2", textDecoration: "none", fontWeight: 500 }}>
                  Iniciar sesión con SAML SSO
                </a>
                <a href="#" onClick={(e) => { e.preventDefault(); setMode("password"); }} style={{ color: "#6B7280", textDecoration: "none" }}>
                  Usar correo y contraseña
                </a>
              </div>
            </div>
          )}

          {mode === "sso" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <Input
                label="Identificador del equipo"
                placeholder="nombre-equipo"
                hint="Te redirigiremos al proveedor de identidad de tu organización."
                value={team}
                onChange={(e) => setTeam(e.target.value)}
              />
              <Button variant="primary" size="lg" disabled={team.trim().length === 0}>
                Continuar con SSO
              </Button>
              <a href="#" onClick={(e) => { e.preventDefault(); setMode("social"); }} style={{ fontSize: 13, color: "#6B7280", textDecoration: "none", textAlign: "center" }}>
                ← Volver
              </a>
            </div>
          )}

          {mode === "password" && (
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <Input label="Correo electrónico" placeholder="tu@mintral.cl" defaultValue="operador@mintral.cl"/>
              <Input
                label="Contraseña" type="password" defaultValue="••••••••"
                error={err ? "Acceso denegado. Verifica tus credenciales e inténtalo de nuevo." : null}
              />
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 2 }}>
                <label style={{ display: "flex", gap: 8, alignItems: "center", fontSize: 13, color: "#4B5563" }}>
                  <input type="checkbox" style={{ accentColor: "#1C64F2" }}/>Recordarme
                </label>
                <a href="#" style={{ fontSize: 13, color: "#1C64F2", textDecoration: "none" }}>¿Olvidaste tu contraseña?</a>
              </div>
              <Button variant="primary" size="lg" onClick={() => { setErr(true); }}>
                Iniciar sesión
              </Button>
              <a href="#" onClick={(e) => { e.preventDefault(); setMode("social"); }} style={{ fontSize: 13, color: "#6B7280", textDecoration: "none", textAlign: "center" }}>
                ← Volver
              </a>
            </div>
          )}

          <p style={{ fontSize: 13, color: "#6B7280", marginTop: 24, textAlign: "center" }}>
            ¿No tienes cuenta?{" "}
            <a href="#" style={{ color: "#1C64F2", textDecoration: "none", fontWeight: 500 }}>Solicitar acceso</a>
          </p>
        </div>
      </main>

      {/* BOTTOM — version footer */}
      <footer style={{
        display: "flex", justifyContent: "space-between", alignItems: "center",
        padding: "20px 40px", fontSize: 12, color: "#9CA3AF",
        borderTop: "1px solid #E5E7EB", background: "#fff",
      }}>
        <span>© 2024 Coordinador de Viajes. Todos los derechos reservados.</span>
        <span>Versión 1.2</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Login/>);
</script>
</body>
</html>
