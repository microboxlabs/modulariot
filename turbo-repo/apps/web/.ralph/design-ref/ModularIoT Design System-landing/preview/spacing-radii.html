<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:flex;gap:16px;align-items:flex-end;justify-content:space-around;">
    <div style="text-align:center;"><div style="width:70px;height:70px;background:#E1EFFE;border:1px solid #C3DDFD;border-radius:2px;"></div><div style="font-size:11px;color:var(--fg-2);margin-top:8px;font-weight:500;">xs · 2</div></div>
    <div style="text-align:center;"><div style="width:70px;height:70px;background:#E1EFFE;border:1px solid #C3DDFD;border-radius:4px;"></div><div style="font-size:11px;color:var(--fg-2);margin-top:8px;font-weight:500;">sm · 4</div></div>
    <div style="text-align:center;"><div style="width:70px;height:70px;background:#E1EFFE;border:1px solid #C3DDFD;border-radius:6px;"></div><div style="font-size:11px;color:var(--fg-2);margin-top:8px;font-weight:500;">md · 6</div></div>
    <div style="text-align:center;"><div style="width:70px;height:70px;background:#1C64F2;border-radius:8px;"></div><div style="font-size:11px;color:#1C64F2;margin-top:8px;font-weight:600;">lg · 8 ★</div></div>
    <div style="text-align:center;"><div style="width:70px;height:70px;background:#E1EFFE;border:1px solid #C3DDFD;border-radius:12px;"></div><div style="font-size:11px;color:var(--fg-2);margin-top:8px;font-weight:500;">xl · 12</div></div>
    <div style="text-align:center;"><div style="width:70px;height:70px;background:#E1EFFE;border:1px solid #C3DDFD;border-radius:16px;"></div><div style="font-size:11px;color:var(--fg-2);margin-top:8px;font-weight:500;">2xl · 16</div></div>
    <div style="text-align:center;"><div style="width:70px;height:70px;background:#E1EFFE;border:1px solid #C3DDFD;border-radius:9999px;"></div><div style="font-size:11px;color:var(--fg-2);margin-top:8px;font-weight:500;">pill</div></div>
  </div>
  <div style="margin-top:12px;font-size:12px;color:var(--fg-3);">★ <strong>lg 8 px</strong> is the default — buttons, inputs, cards. Pill for badges and avatars.</div>
</div>
</body></html>
