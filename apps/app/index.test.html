<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <script src="https://cdn.lordicon.com/lordicon.js"></script>
    <lord-icon
      src="https://cdn.lordicon.com/stxfyhky.json"
      trigger="in"
      delay="1500"
      state="in-reveal"
      colors="primary:#1c64f2,secondary:#1c64f2"
      style="width: 250px; height: 250px"
    >
    </lord-icon>

    <lord-icon
      src="https://cdn.lordicon.com/stxfyhky.json"
      trigger="morph"
      state="morph-correct"
      colors="primary:#31c48d,secondary:#31c48d"
      style="width: 250px; height: 250px"
    >
    </lord-icon>

    <lord-icon
      src="https://cdn.lordicon.com/stxfyhky.json"
      trigger="hover"
      state="hover-wrong"
      colors="primary:#c71f16,secondary:#c71f16"
      style="width: 250px; height: 250px"
    >
    </lord-icon>

    <lord-icon
      src="https://cdn.lordicon.com/qazlpgwc.json"
      trigger="in"
      delay="1500"
      state="in-reveal"
      colors="primary:#1c64f2,secondary:#1c64f2"
      style="width: 250px; height: 250px"
    >
    </lord-icon>

    <lord-icon
      src="https://cdn.lordicon.com/kswtktcs.json"
      trigger="in"
      delay="1500"
      state="in-reveal"
      colors="primary:#1c64f2,secondary:#1c64f2"
      style="width: 250px; height: 250px"
    >
    </lord-icon>
  </body>
</html>
