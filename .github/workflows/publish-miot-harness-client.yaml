name: Publish miot-harness-client

on:
  push:
    tags:
      - "miot-harness-client@v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. miot-harness-client@v0.2.0)"
        required: true

env:
  NODE_VERSION: "24"

jobs:
  publish:
    name: Publish to npmjs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write          # OIDC for npm trusted publishers

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: turbo-repo/package-lock.json

      # Publish from a fresh, lockfile-verified install. No restorable
      # node_modules cache — one populated by any branch's CI could poison the
      # published tarball. setup-node's `cache: npm` still keeps this fast by
      # caching the integrity-checked download tarballs.
      - name: Install dependencies
        run: npm ci
        working-directory: turbo-repo

      - name: Build package
        run: npx turbo run build --filter=@microboxlabs/miot-harness-client
        working-directory: turbo-repo

      - name: Run lint
        run: npx turbo run lint --filter=@microboxlabs/miot-harness-client
        working-directory: turbo-repo

      - name: Run type check
        run: npx turbo run check-types --filter=@microboxlabs/miot-harness-client
        working-directory: turbo-repo

      - name: Run tests
        run: npx turbo run test --filter=@microboxlabs/miot-harness-client
        working-directory: turbo-repo

      - name: Publish to npm
        run: npm publish --workspace=packages/miot-harness-client --access public
        working-directory: turbo-repo
