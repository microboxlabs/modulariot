name: MIOT Stack Nightly

on:
  push:
    branches:
      - trunk
      - main
    paths:
      - 'turbo-repo/apps/app/**'
      - 'turbo-repo/packages/ui/**'
      - 'turbo-repo/packages/db/**'
      - 'turbo-repo/packages/typescript-config/**'
      - 'turbo-repo/package-lock.json'
      - 'turbo-repo/docker/**'
      - 'quarkus-srv/**'
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

concurrency:
  group: miot-stack-nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  GHCR_REGISTRY: ghcr.io
  IMAGE_OWNER: microboxlabs
  APP_IMAGE_NAME: miot-app
  MODULITH_IMAGE_NAME: miot-srv

jobs:
  metadata:
    name: Resolve nightly metadata
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
      nightly_date: ${{ steps.vars.outputs.nightly_date }}
    steps:
      - name: Resolve image metadata
        id: vars
        run: |
          {
            echo "short_sha=${GITHUB_SHA::7}"
            echo "nightly_date=$(date -u +'%Y%m%d')"
          } >> "$GITHUB_OUTPUT"

  build-app:
    name: Build and publish nightly app image
    runs-on: ubuntu-latest
    needs: metadata
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      NEXT_PUBLIC_INGEST_URL: ${{ vars.NEXT_PUBLIC_INGEST_URL }}
      NEXT_PUBLIC_MAPBOX_API_KEY: ${{ secrets.NEXT_PUBLIC_MAPBOX_API_KEY }}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
      NEXT_PUBLIC_AUTENTIA_PATH: ${{ secrets.NEXT_PUBLIC_AUTENTIA_PATH }}
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: turbo-repo/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: turbo-repo

      - name: Build app
        run: npx turbo run build --filter=@modulariot/app
        working-directory: turbo-repo

      - name: Prepare Docker context
        run: |
          mkdir -p /tmp/build-app/.next
          cp -r turbo-repo/apps/app/.next/standalone /tmp/build-app/.next/standalone
          cp -r turbo-repo/apps/app/.next/static /tmp/build-app/.next/static
          cp -r turbo-repo/apps/app/public /tmp/build-app/public
          cp turbo-repo/docker/nextjs.standalone.Dockerfile /tmp/build-app/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: docker
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: /tmp/build-app/
          file: /tmp/build-app/nextjs.standalone.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.APP_IMAGE_NAME }}:nightly
            ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.APP_IMAGE_NAME }}:nightly-${{ needs.metadata.outputs.nightly_date }}
            ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.APP_IMAGE_NAME }}:sha-${{ needs.metadata.outputs.short_sha }}
          labels: |
            org.opencontainers.image.title=${{ env.APP_IMAGE_NAME }}
            org.opencontainers.image.description=ModularIoT app nightly build
            org.opencontainers.image.vendor=MicroboxLabs
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          build-args: |
            APP_NAME=app
          provenance: true
          sbom: true

      - name: Resolve immutable image reference
        id: image
        run: echo "image=${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.APP_IMAGE_NAME }}@${{ steps.docker.outputs.digest }}" >> "$GITHUB_OUTPUT"

      - name: Nightly summary
        run: |
          {
            echo "# MIOT App Nightly"
            echo ""
            echo "- Image: \`${{ steps.image.outputs.image }}\`"
            echo "- Tags: \`nightly\`, \`nightly-${{ needs.metadata.outputs.nightly_date }}\`, \`sha-${{ needs.metadata.outputs.short_sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  resolve-modulith:
    name: Resolve nightly modulith image
    runs-on: ubuntu-latest
    needs: metadata
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image: ${{ steps.image.outputs.image }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      source_tag: ${{ steps.resolve.outputs.source_tag }}
    steps:
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve source image
        id: resolve
        env:
          SHA_IMAGE: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.MODULITH_IMAGE_NAME }}:sha-${{ needs.metadata.outputs.short_sha }}
          LATEST_IMAGE: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.MODULITH_IMAGE_NAME }}:latest
        run: |
          if docker buildx imagetools inspect "$SHA_IMAGE" >/dev/null; then
            source_image="$SHA_IMAGE"
            source_tag="sha-${{ needs.metadata.outputs.short_sha }}"
          else
            source_image="$LATEST_IMAGE"
            source_tag="latest"
          fi

          docker buildx imagetools inspect "$source_image" >/dev/null
          {
            echo "source_image=$source_image"
            echo "source_tag=$source_tag"
            echo "image_tag=nightly-${{ needs.metadata.outputs.nightly_date }}"
          } >> "$GITHUB_OUTPUT"

      - name: Promote nightly tags
        env:
          SOURCE_IMAGE: ${{ steps.resolve.outputs.source_image }}
          NIGHTLY_IMAGE: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.MODULITH_IMAGE_NAME }}:nightly
          DATED_IMAGE: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.MODULITH_IMAGE_NAME }}:nightly-${{ needs.metadata.outputs.nightly_date }}
          SHA_NIGHTLY_IMAGE: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.MODULITH_IMAGE_NAME }}:nightly-${{ needs.metadata.outputs.nightly_date }}-${{ needs.metadata.outputs.short_sha }}
        run: |
          docker buildx imagetools create \
            --tag "$NIGHTLY_IMAGE" \
            --tag "$DATED_IMAGE" \
            --tag "$SHA_NIGHTLY_IMAGE" \
            "$SOURCE_IMAGE"

      - name: Resolve immutable image reference
        id: image
        run: |
          digest="$(docker buildx imagetools inspect "${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.MODULITH_IMAGE_NAME }}:nightly-${{ needs.metadata.outputs.nightly_date }}-${{ needs.metadata.outputs.short_sha }}" | awk '/^Digest:/ { print $2; exit }')"
          echo "image=${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.MODULITH_IMAGE_NAME }}@${digest}" >> "$GITHUB_OUTPUT"

      - name: Nightly summary
        run: |
          {
            echo "# MIOT Modulith Nightly"
            echo ""
            echo "- Image: \`${{ steps.image.outputs.image }}\`"
            echo "- Source tag: \`${{ steps.resolve.outputs.source_tag }}\`"
            echo "- Tags: \`nightly\`, \`nightly-${{ needs.metadata.outputs.nightly_date }}\`, \`nightly-${{ needs.metadata.outputs.nightly_date }}-${{ needs.metadata.outputs.short_sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Dispatch development environment deploys
    runs-on: ubuntu-latest
    needs: [metadata, build-app, resolve-modulith]
    permissions:
      contents: read
    environment:
      # Dispatch credentials are shared with tagged releases. The private
      # deployment repository still restricts nightly targets to development.
      name: app-deploy
    steps:
      - name: Dispatch private deployment workflow
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
          DEPLOY_DISPATCH_REPO: ${{ secrets.DEPLOY_DISPATCH_REPO }}
          RELEASE_VERSION: nightly-${{ needs.metadata.outputs.nightly_date }}-${{ needs.metadata.outputs.short_sha }}
          APP_TAG: app@nightly-${{ needs.metadata.outputs.nightly_date }}-${{ needs.metadata.outputs.short_sha }}
          MODULITH_TAG: modulith@nightly-${{ needs.metadata.outputs.nightly_date }}-${{ needs.metadata.outputs.short_sha }}
          APP_IMAGE_REPOSITORY: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.APP_IMAGE_NAME }}
          APP_IMAGE_TAG: sha-${{ needs.metadata.outputs.short_sha }}
          APP_IMAGE_REF: ${{ needs.build-app.outputs.image }}
          MODULITH_IMAGE_REPOSITORY: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.MODULITH_IMAGE_NAME }}
          MODULITH_IMAGE_TAG: ${{ needs.resolve-modulith.outputs.image_tag }}
          MODULITH_IMAGE_REF: ${{ needs.resolve-modulith.outputs.image }}
          MODULITH_SOURCE_TAG: ${{ needs.resolve-modulith.outputs.source_tag }}
        run: |
          DEPLOY_DISPATCH_REPO="${DEPLOY_DISPATCH_REPO:-microboxlabs/miot-deployments}"

          if [[ -z "$GH_TOKEN" ]]; then
            echo "DEPLOY_DISPATCH_TOKEN is required to dispatch the private deployment repository." >&2
            exit 1
          fi

          jq -n \
            --arg release_version "$RELEASE_VERSION" \
            --arg app_tag "$APP_TAG" \
            --arg modulith_tag "$MODULITH_TAG" \
            --arg app_image_repository "$APP_IMAGE_REPOSITORY" \
            --arg app_image_tag "$APP_IMAGE_TAG" \
            --arg app_image_ref "$APP_IMAGE_REF" \
            --arg modulith_image_repository "$MODULITH_IMAGE_REPOSITORY" \
            --arg modulith_image_tag "$MODULITH_IMAGE_TAG" \
            --arg modulith_image_ref "$MODULITH_IMAGE_REF" \
            --arg modulith_source_tag "$MODULITH_SOURCE_TAG" \
            '{
              event_type: "miot-stack-nightly",
              client_payload: {
                release_version: $release_version,
                app_tag: $app_tag,
                modulith_tag: $modulith_tag,
                app_image_repository: $app_image_repository,
                app_image_tag: $app_image_tag,
                app_image_ref: $app_image_ref,
                modulith_image_repository: $modulith_image_repository,
                modulith_image_tag: $modulith_image_tag,
                modulith_image_ref: $modulith_image_ref
              }
            }' |
            gh api "repos/${DEPLOY_DISPATCH_REPO}/dispatches" \
              --method POST \
              --input -

          echo "Dispatched nightly stack deployment ${RELEASE_VERSION} to ${DEPLOY_DISPATCH_REPO}."
