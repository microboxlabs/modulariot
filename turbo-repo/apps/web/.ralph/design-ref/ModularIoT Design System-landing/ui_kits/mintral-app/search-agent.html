<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MIOT — Search agent</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body, #root { height: 100%; margin: 0; }
  body { background: #F9FAFB; font-family: Inter, sans-serif; overflow: hidden; color: #111928; }
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 8px; }
  *::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="atoms.jsx"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="Topbar.jsx"></script>
<script type="text/babel" src="TripCard.jsx"></script>
<script type="text/babel" src="KanbanBoard.jsx"></script>
<script type="text/babel" src="SearchAgent.jsx"></script>

<script type="text/babel">
const { useState: useAppS, useEffect: useAppE } = React;

function App() {
  const [open, setOpen] = useAppS(true);

  useAppE(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
        e.preventDefault();
        setOpen(true);
      }
      if (e.key === "Escape") setOpen(false);
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  return (
    <div data-screen-label="MIOT — Search agent" style={{ display: "flex", height: "100vh" }}>
      <Sidebar active="shipping" onNavigate={() => {}}/>
      <main style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
        <Topbar crumbs={["My tasks", "Shipping", "Kanban"]} count={12}/>
        <KanbanBoard onOpen={() => {}}/>
      </main>
      {open && <SearchAgent onClose={() => setOpen(false)}/>}

      {!open && (
        <button onClick={() => setOpen(true)} style={{
          position: "fixed", bottom: 24, right: 24, zIndex: 50,
          display: "inline-flex", alignItems: "center", gap: 10,
          padding: "12px 18px", borderRadius: 999,
          background: "linear-gradient(135deg, #111928 0%, #232529 100%)",
          color: "#fff", border: "none", fontFamily: "Inter", fontSize: 13, fontWeight: 500,
          boxShadow: "0 10px 30px -6px rgba(0,0,0,.35)", cursor: "pointer",
        }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.8 5.4L19 9l-5.2 1.6L12 16l-1.8-5.4L5 9l5.2-1.6L12 2z" fill="#F1B300"/></svg>
          Ask MIOT
          <span style={{
            fontFamily: "ui-monospace, monospace", fontSize: 10.5,
            background: "rgba(255,255,255,.15)", padding: "2px 6px", borderRadius: 4,
          }}>⌘K</span>
        </button>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
