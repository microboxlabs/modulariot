# Golden eval dataset for the Nexo (Coordinador) conversational graph.
#
# Consumed by `miot-harness-evals` (src/miot_harness/evals/run_golden.py).
# Each entry must carry every field in `_REQUIRED_FIELDS`. See evals/README.md
# for the scoring contract and the fake-mode determinism rules.
#
# Fake-mode notes (so this baseline scores cleanly):
#   - The scripted synthesizer always emits:
#       "Resultado al snapshot <ts>: 2 servicios críticos, 3 ETA en riesgo."
#     so `expected_kpis_mentioned` must be lowercase substrings of that line.
#   - The fake filter_expert emits exactly ONE tool call, so every run has a
#     1-step plan; `expected_min_turns/expected_max_turns` document the
#     real-mode envelope and only act as an over-engineering cap there.
#   - `expected_tools` must be `coordinador_*` names (the fake registry only
#     stubs those); adversarial cases use [] and rely on the tenant gate or
#     the centro_control fallback.

# ---------------------------------------------------------------- single_tool
- id: nexo-single-001-status-summary
  question: "¿Cuál es el estado general de la flota ahora mismo?"
  tenant_id: mintral
  category: single_tool
  expected_tools: ["coordinador_centro_control"]
  forbidden_tools: []
  expected_kpis_mentioned: ["2", "crítico"]
  expected_freshness_cited: true
  expected_refusal: false
  expected_min_turns: 1
  expected_max_turns: 1

