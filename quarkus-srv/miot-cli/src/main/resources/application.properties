# =============================================================================
# ModularIoT — Application Configuration
# =============================================================================

# --- Component activation ---
# Master switch: set to true for all-in-one mode
miot.component.all.enabled=false
# Individual overrides: defaults to the master switch value
miot.component.fleet.enabled=${miot.component.all.enabled}
miot.component.driver.enabled=${miot.component.all.enabled}

# --- HTTP ---
quarkus.http.port=8180

# --- Datasource ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=miot
quarkus.datasource.password=miot
quarkus.datasource.reactive.url=postgresql://localhost:5432/miot
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/miot
quarkus.datasource.jdbc.max-size=5

# --- Assignment external data sources ---
miot.assignment.resource.fleet-schema=miot_fleet
miot.assignment.resource.driver-schema=miot_driver
miot.assignment.coordinator.enabled=false
miot.assignment.coordinator.schema=alerce
miot.assignment.streamhub.enabled=false
miot.assignment.streamhub.schema=public

# Required when coordinator lookup is enabled.
quarkus.datasource.coordinator.active=${miot.assignment.coordinator.enabled}
quarkus.datasource.coordinator.db-kind=postgresql
quarkus.datasource.coordinator.reactive.url=postgresql://localhost:6434/citus
quarkus.datasource.coordinator.username=sampleusername
quarkus.datasource.coordinator.password=samplepassword
quarkus.datasource.coordinator.reactive.max-size=5

# Required when streamhub lookup is enabled.
quarkus.datasource.streamhub.active=${miot.assignment.streamhub.enabled}
quarkus.datasource.streamhub.db-kind=postgresql
quarkus.datasource.streamhub.reactive.url=postgresql://localhost:5432/prod_iot_gps
quarkus.datasource.streamhub.username=sampleusername
quarkus.datasource.streamhub.password=samplepassword
quarkus.datasource.streamhub.reactive.max-size=5

# --- Flyway ---
# Migration is handled programmatically by FlywayMigrator based on active components
quarkus.flyway.migrate-at-start=false
miot.flyway.base-locations=db/migration/core,db/migration/resource

# --- Hibernate ---
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# --- OIDC ---
# Production: set via env var QUARKUS_OIDC_AUTH_SERVER_URL
quarkus.http.auth.permission.api.paths=/api/*
quarkus.http.auth.permission.api.policy=authenticated
quarkus.http.auth.permission.public.paths=/q/*
quarkus.http.auth.permission.public.policy=permit
# JWT claims to check for client_id (in order). OIDC web = aud, M2M = azp
miot.auth.client-id-claims=aud,azp

# --- Health ---
quarkus.smallrye-health.root-path=/q/health

# --- Container image ---
quarkus.container-image.group=microboxlabs
quarkus.container-image.name=miot
quarkus.container-image.tag=${quarkus.application.version:latest}

# --- Dev profile ---
%dev.quarkus.datasource.devservices.enabled=false
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/miot_dev
%dev.quarkus.datasource.reactive.url=postgresql://localhost:5432/miot_dev
%dev.quarkus.datasource.coordinator.devservices.enabled=false
%dev.quarkus.datasource.streamhub.devservices.enabled=false
%dev.quarkus.hibernate-orm.log.sql=true
# OIDC dev services: auto-starts Keycloak container with test users
%dev.quarkus.oidc.devservices.enabled=true
%dev.quarkus.oidc.devservices.roles.alice=admin
%dev.quarkus.oidc.devservices.roles.bob=user
# In dev mode, use "sub" claim as client_id (maps to Keycloak username: alice, bob)
%dev.miot.auth.client-id-claims=sub,aud,azp

# --- Alfresco connection (stub for Phase 1) ---
miot.alfresco.url=http://localhost:8080/alfresco
miot.alfresco.username=admin
miot.alfresco.password=admin
%dev.miot.alfresco.url=http://localhost:8080/alfresco

# --- Micrometer / Prometheus ---
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.binder.http-server.enabled=true

# --- OpenAPI / Swagger UI ---
quarkus.smallrye-openapi.info-title=ModularIoT API
quarkus.smallrye-openapi.info-version=${quarkus.application.version:1.0.0-SNAPSHOT}
quarkus.smallrye-openapi.info-description=Multi-tenant fleet and driver resource management with KPI scoring
quarkus.smallrye-openapi.security-scheme=jwt
quarkus.smallrye-openapi.security-scheme-name=oidc
quarkus.smallrye-openapi.security-scheme-description=JWT Bearer token. In dev mode get a token from /q/dev-ui (OIDC Dev Services) or use X-Client-Id header.
quarkus.swagger-ui.always-include=true

# --- Bulk Sync ---
miot.bulk-sync.max-batch-size=1000

# --- Deferred FK Reconciliation ---
miot.reconciliation.cron=0 */15 * * * ?
