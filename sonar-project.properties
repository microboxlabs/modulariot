# SonarQube Configuration
sonar.projectKey=coordinador-webclient
sonar.projectName=Coordinador WebClient
sonar.projectVersion=1.0

# Source code paths
sonar.sources=src
sonar.tests=src

# Exclude paths
sonar.exclusions=public/autentia/**,node_modules/**,coverage/**,.next/**,.swc/**

# Test coverage exclusions
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,public/autentia/**

# Language
sonar.language=ts 