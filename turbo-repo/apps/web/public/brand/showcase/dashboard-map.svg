<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#f8fafc"/>
  <rect x="20" y="20" width="560" height="60" rx="8" fill="#1e293b"/>
  <text x="30" y="50" font-family="Arial, sans-serif" font-size="18" fill="white" font-weight="bold">IoT Fleet Dashboard</text>
  <text x="450" y="50" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">Live: 1,247 devices</text>
  
  <!-- Map background -->
  <rect x="20" y="100" width="380" height="280" rx="8" fill="#e2e8f0" stroke="#cbd5e1"/>
  <text x="200" y="240" font-family="Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">Interactive Map View</text>
  
  <!-- Device markers -->
  <circle cx="120" cy="160" r="6" fill="#22c55e"/>
  <circle cx="280" cy="200" r="6" fill="#ef4444"/>
  <circle cx="180" cy="280" r="6" fill="#22c55e"/>
  <circle cx="320" cy="180" r="6" fill="#f59e0b"/>
  <circle cx="150" cy="220" r="6" fill="#22c55e"/>
  
  <!-- Side panel -->
  <rect x="420" y="100" width="160" height="280" rx="8" fill="white" stroke="#e2e8f0"/>
  <text x="430" y="125" font-family="Arial, sans-serif" font-size="14" fill="#1e293b" font-weight="bold">Device Status</text>
  
  <!-- Status items -->
  <rect x="430" y="140" width="12" height="12" fill="#22c55e"/>
  <text x="450" y="150" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Healthy: 1,185</text>
  
  <rect x="430" y="160" width="12" height="12" fill="#f59e0b"/>
  <text x="450" y="170" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Warning: 47</text>
  
  <rect x="430" y="180" width="12" height="12" fill="#ef4444"/>
  <text x="450" y="190" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Critical: 15</text>
</svg>