# =============================================================================
# ModularIoT — Application Configuration
# =============================================================================
# Sensitive values are read from environment variables (see .env.sample).
# MicroProfile Config resolution order: env vars > .env file > this file.

# --- Component activation ---
# Master switch: set to true for all-in-one mode
miot.component.all.enabled=false
# Individual overrides: defaults to the master switch value
miot.component.fleet.enabled=${miot.component.all.enabled}
miot.component.driver.enabled=${miot.component.all.enabled}
miot.component.tracking.enabled=${miot.component.all.enabled}

# --- HTTP ---
quarkus.http.port=8180

# --- Datasource: miot (primary — entity directory, KPI scores, events) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${MIOT_DB_USER:miot}
quarkus.datasource.password=${MIOT_DB_PASSWORD:miot}
quarkus.datasource.reactive.url=${MIOT_DB_REACTIVE_URL:postgresql://localhost:5432/miot}
quarkus.datasource.jdbc.url=${MIOT_DB_JDBC_URL:jdbc:postgresql://localhost:5432/miot}
quarkus.datasource.jdbc.max-size=5

# --- Datasource: metrics (read-only — asset_metric_core, fn_latest_metrics) ---
# Points to the IoT GPS tracking database where OBD2/telemetry data lands.
# Used exclusively by LatestMetricsRepository for fleet card telemetry reads.
quarkus.datasource."metrics".db-kind=postgresql
quarkus.datasource."metrics".username=${METRICS_DB_USER:streamhub}
quarkus.datasource."metrics".password=${METRICS_DB_PASSWORD:streamhub}
quarkus.datasource."metrics".reactive.url=${METRICS_DB_URL:postgresql://localhost:8432/prod_iot_gps}
quarkus.datasource."metrics".reactive.max-size=5

# --- Flyway ---
# Migration is handled programmatically by FlywayMigrator based on active components
quarkus.flyway.migrate-at-start=false
quarkus.flyway.out-of-order=true
miot.flyway.base-locations=db/migration/core,db/migration/resource

# --- Hibernate ---
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# --- OIDC ---
quarkus.http.auth.permission.api.paths=/api/*
quarkus.http.auth.permission.api.policy=authenticated
quarkus.http.auth.permission.public.paths=/q/*
quarkus.http.auth.permission.public.policy=permit
# JWT claims to check for client_id (in order). OIDC web = aud, M2M = azp
miot.auth.client-id-claims=aud,azp

# --- Health ---
quarkus.smallrye-health.root-path=/q/health

# --- Container image ---
quarkus.container-image.group=microboxlabs
quarkus.container-image.name=miot
quarkus.container-image.tag=${quarkus.application.version:latest}

# --- Dev profile ---
%dev.quarkus.datasource.devservices.enabled=false
%dev.quarkus.datasource.jdbc.url=${MIOT_DB_JDBC_URL:jdbc:postgresql://localhost:5432/miot_dev}
%dev.quarkus.datasource.reactive.url=${MIOT_DB_REACTIVE_URL:postgresql://localhost:5432/miot_dev}
%dev.quarkus.hibernate-orm.log.sql=true
# OIDC dev services: auto-starts Keycloak container with test users
%dev.quarkus.oidc.devservices.enabled=true
%dev.quarkus.oidc.devservices.roles.alice=admin
%dev.quarkus.oidc.devservices.roles.bob=user
# In dev mode, use "sub" claim as client_id (maps to Keycloak username: alice, bob)
%dev.miot.auth.client-id-claims=sub,aud,azp

# --- Auth0 profile (./start.sh tracking -- -Dquarkus.profile=auth0) ---
# Accepts Auth0 M2M tokens (HS256) using SmallRye JWT with shared secret.
%auth0.quarkus.oidc.enabled=false
%auth0.quarkus.oidc.devservices.enabled=false
%auth0.smallrye.jwt.verify.key-format=JWK
%auth0.mp.jwt.verify.publickey.algorithm=HS256
%auth0.mp.jwt.verify.publickey.location=${AUTH0_JWT_KEY_LOCATION:secret.jwk}
%auth0.mp.jwt.verify.issuer=${AUTH0_ISSUER}
%auth0.smallrye.jwt.path.groups=scope
%auth0.miot.auth.client-id-claims=azp,sub
%auth0.quarkus.datasource.devservices.enabled=false
%auth0.quarkus.datasource.jdbc.url=${MIOT_DB_JDBC_URL:jdbc:postgresql://localhost:5432/miot_dev}
%auth0.quarkus.datasource.reactive.url=${MIOT_DB_REACTIVE_URL:postgresql://localhost:5432/miot_dev}
%auth0.quarkus.hibernate-orm.log.sql=true

# --- Alfresco connection (stub for Phase 1) ---
miot.alfresco.url=${ALFRESCO_URL:http://localhost:8080/alfresco}
miot.alfresco.username=${ALFRESCO_USER:admin}
miot.alfresco.password=${ALFRESCO_PASSWORD:admin}

# --- Micrometer / Prometheus ---
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.binder.http-server.enabled=true

# --- OpenAPI / Swagger UI ---
quarkus.smallrye-openapi.info-title=ModularIoT API
quarkus.smallrye-openapi.info-version=${quarkus.application.version:1.0.0-SNAPSHOT}
quarkus.smallrye-openapi.info-description=Multi-tenant fleet and driver resource management with KPI scoring
quarkus.smallrye-openapi.security-scheme=jwt
quarkus.smallrye-openapi.security-scheme-name=oidc
quarkus.smallrye-openapi.security-scheme-description=JWT Bearer token. In dev mode get a token from /q/dev-ui (OIDC Dev Services) or use X-Client-Id header.
quarkus.swagger-ui.always-include=true

# --- Bulk Sync ---
miot.bulk-sync.max-batch-size=1000

# --- Deferred FK Reconciliation ---
miot.reconciliation.cron=0 */15 * * * ?

# --- External messaging ---
#   log    = standalone mode: messages logged at DEBUG, not sent (default)
#   pulsar = production: publishes to Apache Pulsar
miot.messaging.type=${MIOT_MESSAGING_TYPE:log}
pulsar.client.serviceUrl=${PULSAR_URL:pulsar://localhost:6650}
miot.tracking.pulsar.topic=${MIOT_TRACKING_TOPIC}

# --- gps-model bean discovery ---
quarkus.index-dependency.gps-model.group-id=cl.streamhub
quarkus.index-dependency.gps-model.artifact-id=gps-model
