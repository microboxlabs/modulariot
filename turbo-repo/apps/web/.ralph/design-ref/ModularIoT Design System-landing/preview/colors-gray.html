<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:grid;grid-template-columns:repeat(10, 1fr);gap:4px;">
    <div class="swatch light" style="background:#F9FAFB;height:60px;"><span class="hex">50</span></div>
    <div class="swatch light" style="background:#F3F4F6;height:60px;"><span class="hex">100</span></div>
    <div class="swatch light" style="background:#E5E7EB;height:60px;"><span class="hex">200</span></div>
    <div class="swatch light" style="background:#D1D5DB;height:60px;"><span class="hex">300</span></div>
    <div class="swatch" style="background:#9CA3AF;height:60px;"><span class="hex">400</span></div>
    <div class="swatch" style="background:#6B7280;height:60px;"><span class="hex">500</span></div>
    <div class="swatch" style="background:#4B5563;height:60px;"><span class="hex">600</span></div>
    <div class="swatch" style="background:#374151;height:60px;"><span class="hex">700</span></div>
    <div class="swatch" style="background:#1F2A37;height:60px;"><span class="hex">800</span></div>
    <div class="swatch" style="background:#111928;height:60px;"><span class="hex">900</span></div>
  </div>
  <div style="margin-top:10px;display:flex;justify-content:space-between;font-size:12px;color:var(--fg-3);">
    <span>Flowbite gray — the whole UI is built on this ramp</span>
    <span>Body text = <strong>900</strong> · Meta = <strong>500</strong> · Border = <strong>200</strong></span>
  </div>
</div>
</body></html>
