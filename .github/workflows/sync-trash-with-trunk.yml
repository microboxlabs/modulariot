name: Sync trash with trunk

on:
  schedule:
    # Run every hour
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  sync-branches:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout trunk
        uses: actions/checkout@v4
        with:
          ref: trunk

      - name: Fetch trash branch
        run: git fetch origin trash

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge trunk into trash
        run: |
          # Ensure we have latest trunk
          git fetch origin trunk
          git checkout trunk
          git pull origin trunk

          # Checkout trash (create local branch tracking origin/trash if needed)
          git checkout trash 2>/dev/null || git checkout -b trash origin/trash

          # Merge trunk into trash; allow unrelated histories so initial sync works
          git merge origin/trunk -m "Sync trunk into trash $(date '+%Y-%m-%d %H:%M')" --allow-unrelated-histories

          # Push updated trash
          git push origin trash
