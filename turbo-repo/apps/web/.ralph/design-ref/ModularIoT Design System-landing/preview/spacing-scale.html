<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:flex;align-items:flex-end;gap:14px;">
    <div style="text-align:center;"><div style="width:4px;height:4px;background:#1C64F2;border-radius:2px;margin:0 auto;"></div><div style="font-size:10px;color:var(--fg-3);margin-top:6px;font-family:monospace">1·4</div></div>
    <div style="text-align:center;"><div style="width:8px;height:8px;background:#1C64F2;border-radius:2px;margin:0 auto;"></div><div style="font-size:10px;color:var(--fg-3);margin-top:6px;font-family:monospace">2·8</div></div>
    <div style="text-align:center;"><div style="width:12px;height:12px;background:#1C64F2;border-radius:2px;margin:0 auto;"></div><div style="font-size:10px;color:var(--fg-3);margin-top:6px;font-family:monospace">3·12</div></div>
    <div style="text-align:center;"><div style="width:16px;height:16px;background:#1C64F2;border-radius:2px;margin:0 auto;"></div><div style="font-size:10px;color:var(--fg-3);margin-top:6px;font-family:monospace">4·16</div></div>
    <div style="text-align:center;"><div style="width:20px;height:20px;background:#1C64F2;border-radius:2px;margin:0 auto;"></div><div style="font-size:10px;color:var(--fg-3);margin-top:6px;font-family:monospace">5·20</div></div>
    <div style="text-align:center;"><div style="width:24px;height:24px;background:#1C64F2;border-radius:2px;margin:0 auto;"></div><div style="font-size:10px;color:var(--fg-3);margin-top:6px;font-family:monospace">6·24</div></div>
    <div style="text-align:center;"><div style="width:32px;height:32px;background:#1C64F2;border-radius:2px;margin:0 auto;"></div><div style="font-size:10px;color:var(--fg-3);margin-top:6px;font-family:monospace">8·32</div></div>
    <div style="text-align:center;"><div style="width:40px;height:40px;background:#1C64F2;border-radius:2px;margin:0 auto;"></div><div style="font-size:10px;color:var(--fg-3);margin-top:6px;font-family:monospace">10·40</div></div>
    <div style="text-align:center;"><div style="width:48px;height:48px;background:#1C64F2;border-radius:2px;margin:0 auto;"></div><div style="font-size:10px;color:var(--fg-3);margin-top:6px;font-family:monospace">12·48</div></div>
    <div style="text-align:center;"><div style="width:64px;height:64px;background:#1C64F2;border-radius:2px;margin:0 auto;"></div><div style="font-size:10px;color:var(--fg-3);margin-top:6px;font-family:monospace">16·64</div></div>
  </div>
  <div style="margin-top:12px;font-size:12px;color:var(--fg-3);">4 px underlies every gap and inset. Prefer 8 / 12 / 16 / 24 for control interiors; 24 for card padding.</div>
</div>
</body></html>
