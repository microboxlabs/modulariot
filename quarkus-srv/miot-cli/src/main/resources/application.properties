# =============================================================================
# ModularIoT — Application Configuration
# =============================================================================
# Sensitive values are read from environment variables (see .env.sample).
# MicroProfile Config resolution order: env vars > .env file > this file.

# --- Component activation ---
# Master switch: set to true for all-in-one mode
miot.component.all.enabled=false
# Individual overrides: defaults to the master switch value
miot.component.fleet.enabled=${miot.component.all.enabled}
miot.component.driver.enabled=${miot.component.all.enabled}
miot.component.tracking.enabled=${miot.component.all.enabled}
miot.component.gateway.enabled=${miot.component.all.enabled}
miot.component.integrations.enabled=${miot.component.all.enabled}
miot.integrations.secret-key=${MIOT_INTEGRATIONS_SECRET_KEY:not-configured}

# --- HTTP ---
quarkus.http.port=8180

# --- Datasource: miot (primary — entity directory, KPI scores, events) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${MIOT_DB_USER:miot}
quarkus.datasource.password=${MIOT_DB_PASSWORD:miot}
quarkus.datasource.reactive.url=${MIOT_DB_REACTIVE_URL:postgresql://localhost:5432/miot}
quarkus.datasource.jdbc.url=${MIOT_DB_JDBC_URL:jdbc:postgresql://localhost:5432/miot}
quarkus.datasource.jdbc.max-size=5


# --- Flyway ---
# Migration is handled programmatically by FlywayMigrator based on active components
quarkus.flyway.migrate-at-start=false
quarkus.flyway.out-of-order=true
# Pin the Quarkus Flyway extension's metadata table to miot_core so any
# *-at-start action (migrate / validate / baseline / repair) inadvertently
# enabled via env (QUARKUS_FLYWAY_MIGRATE_AT_START=true on a deployment, etc.)
# never touches the `public` schema. Mirrors FlywayMigrator's own .schemas()
# call so both Flyway instances (extension + programmatic) agree.
quarkus.flyway.schemas=miot_core
quarkus.flyway.default-schema=miot_core
miot.flyway.base-locations=db/migration/core,db/migration/resource

# --- Hibernate ---
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# --- Auth ---
quarkus.http.auth.permission.api.paths=/api/*
quarkus.http.auth.permission.api.policy=authenticated
quarkus.http.auth.permission.public.paths=/q/*
quarkus.http.auth.permission.public.policy=permit
# JWT claims to check for client_id (in order). M2M = azp, web = aud
miot.auth.client-id-claims=azp,aud

# --- Health ---
quarkus.smallrye-health.root-path=/q/health

# --- Container image ---
quarkus.container-image.group=microboxlabs
quarkus.container-image.name=miot
quarkus.container-image.tag=${quarkus.application.version:latest}

# --- Dev profile ---
%dev.quarkus.datasource.devservices.enabled=false
%dev.quarkus.datasource.jdbc.url=${MIOT_DB_JDBC_URL:jdbc:postgresql://localhost:5432/miot_dev}
%dev.quarkus.datasource.reactive.url=${MIOT_DB_REACTIVE_URL:postgresql://localhost:5432/miot_dev}
%dev.quarkus.hibernate-orm.log.sql=true

# --- Auth (Dual JWT — Auth0 HS256 + RS256) ---
# DualJwtAuthMechanism can verify HS256 and RS256 tokens with distinct issuers.
#   HS256 — M2M device tokens (tracking, stream) signed with shared secret
#   RS256 — Web app tokens (fleet, driver) signed with Auth0's RSA key pair
miot.auth.hs256-issuer=${AUTH0_HS256_ISSUER:${AUTH0_ISSUER:https://placeholder.auth0.com/}}
miot.auth.rs256-issuer=${AUTH0_RS256_ISSUER:${AUTH0_ISSUER:https://placeholder.auth0.com/}}
# HS256 signing secret (from Auth0 API > Settings > Signing Secret)
miot.auth.hs256-secret=${AUTH0_HS256_SECRET:not-configured}
# RS256 JWKS endpoint (Auth0 discovery)
miot.auth.jwks-url=${AUTH0_JWKS_URL:not-configured}
# Expected audiences (reject tokens issued for other APIs)
miot.auth.hs256-audience=${AUTH0_HS256_AUDIENCE:not-configured}
miot.auth.rs256-audience=${AUTH0_RS256_AUDIENCE:not-configured}
# SmallRye JWT is still on the classpath for JsonWebToken principal support
smallrye.jwt.path.groups=scope

# --- Tax id validation ---
# Selects the active TaxIdValidator implementation by code. Ship-today: chilean_rut.
miot.tax-id.validator=${MIOT_TAX_ID_VALIDATOR:chilean_rut}

# --- Alfresco connection ---
# Base URL of the Alfresco instance (everything up to /alfresco, no trailing slash).
miot.alfresco.url=${ALFRESCO_URL:http://localhost:8080/alfresco}
# Authentication scheme used by the Alfresco REST client. One of:
#   oauth — forward the caller's JWT as a Bearer token (requires Alfresco SSO)
#   basic — HTTP Basic with miot.alfresco.basic.username/password (dev, CI, server-to-server)
#   stub  — short-circuit with canned data; no HTTP traffic (default while Phase 4 lands)
miot.alfresco.auth=${MIOT_ALFRESCO_AUTH:stub}
miot.alfresco.basic.username=${ALFRESCO_USER:}
miot.alfresco.basic.password=${ALFRESCO_PASSWORD:}
# REST client base — points the typed client at the public v1 core API.
quarkus.rest-client.alfresco-core.url=${miot.alfresco.url}/api/-default-/public/alfresco/versions/1
quarkus.rest-client.alfresco-core.connect-timeout=10000
quarkus.rest-client.alfresco-core.read-timeout=15000

# --- Fork engine (within miot-gateway) ---
# Master switch for the fork engine
fork.enabled=${FORK_ENABLED:false}
#
# Rules are configured via indexed properties. For non-trivial setups,
# mount a ConfigMap as an additional application.properties file.
#
# Example rule — asset-id based canary fork to storm:
#
#   fork.rules[0].id=asset-track-canary
#   fork.rules[0].enabled=true
#   fork.rules[0].paths[0]=/v1/asset/track
#   fork.rules[0].paths[1]=/api/v1/asset/track
#   fork.rules[0].body-parser=json
#   fork.rules[0].key-field=asset_id
#   fork.rules[0].filter-file=/config/asset-ids.txt        ← K8s ConfigMap volume mount
#   fork.rules[0].targets[0].id=storm
#   fork.rules[0].targets[0].mirror-host=${FORK_STORM_HOST:not-configured}
#   fork.rules[0].targets[0].mirror-path=/v1/asset/track
#   fork.rules[0].targets[0].timeout=5000
#
# Filter file format (/config/asset-ids.txt):
#   # One routing key per line, # comments and blank lines ignored
#   SVSX88
#   ABC123
#
# Kubernetes ConfigMap:
#   data:
#     asset-ids.txt: |
#       # Canary asset IDs for storm environment
#       SVSX88
#
# Env var naming for rules (MicroProfile indexed list convention):
#   FORK_RULES_0__ID, FORK_RULES_0__PATHS_0_, FORK_RULES_0__TARGETS_0__MIRROR_HOST, etc.

# --- Micrometer / Prometheus ---
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.binder.http-server.enabled=true

# --- OpenAPI / Swagger UI ---
quarkus.smallrye-openapi.info-title=ModularIoT API
quarkus.smallrye-openapi.info-version=${quarkus.application.version:1.0.0-SNAPSHOT}
quarkus.smallrye-openapi.info-description=Multi-tenant fleet and driver resource management with KPI scoring
quarkus.smallrye-openapi.security-scheme=jwt
quarkus.smallrye-openapi.security-scheme-name=oidc
quarkus.smallrye-openapi.security-scheme-description=JWT Bearer token from Auth0 M2M client credentials flow.
quarkus.swagger-ui.always-include=true

# --- Bulk Sync ---
miot.bulk-sync.max-batch-size=1000

# --- Deferred FK Reconciliation ---
miot.reconciliation.cron=0 */15 * * * ?

# --- External messaging ---
#   log    = standalone mode: messages logged at DEBUG, not sent (default)
#   pulsar = production: publishes to Apache Pulsar
miot.messaging.type=${MIOT_MESSAGING_TYPE:log}
pulsar.client.serviceUrl=${PULSAR_URL:pulsar://localhost:6650}
miot.tracking.pulsar.topic=${MIOT_TRACKING_TOPIC:not-configured}
miot.tracking.pulsar.subscription=${MIOT_TRACKING_SUBSCRIPTION:asset-positions-sub}
