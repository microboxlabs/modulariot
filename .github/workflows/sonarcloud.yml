# =============================================================================
# SonarCloud Analysis - ModularIoT App
# =============================================================================
# Runs after npm install so workspace package symlinks (e.g. @repo/typescript-config)
# are available and tsconfig.json "extends" chains can be resolved.
#
# Required Secrets:
#   - SONAR_TOKEN: SonarCloud token (Settings > Security > Generate Tokens)
#
# NOTE: If SonarCloud automatic analysis is enabled for this repository,
# disable it in SonarCloud > Administration > Analysis Method to avoid
# duplicate analyses.
# =============================================================================

name: SonarCloud Analysis

on:
  push:
    paths:
      - 'turbo-repo/**'
    branches:
      - trunk
      - main
  pull_request:
    paths:
      - 'turbo-repo/**'
    types: [opened, synchronize, reopened]
    branches:
      - trunk
      - main
  workflow_dispatch:

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # Disable shallow clone — SonarCloud needs full history for blame data
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: turbo-repo/package-lock.json

      - name: Install dependencies
        # Installs workspace symlinks so @repo/typescript-config resolves
        run: npm ci
        working-directory: turbo-repo

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7.0.0
        with:
          projectBaseDir: turbo-repo/apps/app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
