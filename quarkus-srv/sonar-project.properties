# SonarCloud Configuration — ModularIoT Quarkus Backend
sonar.projectKey=microboxlabs_modulariot-quarkus
sonar.projectName=ModularIoT Quarkus
sonar.organization=microboxlabs

# Source code paths (all modules)
sonar.sources=miot-core/src/main/java,miot-fleet/src/main/java,miot-cli/src/main/java
sonar.tests=miot-core/src/test/java,miot-fleet/src/test/java,miot-cli/src/test/java
sonar.java.binaries=miot-core/target/classes,miot-fleet/target/classes,miot-cli/target/classes

# Exclusions
sonar.exclusions=**/target/**,**/*.xml

# Coverage (JaCoCo)
# sonar.coverage.jacoco.xmlReportPaths=miot-cli/target/site/jacoco-aggregate/jacoco.xml

# Encoding
sonar.sourceEncoding=UTF-8
sonar.java.source=21
