name: Feature request
description: Suggest an idea or enhancement
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your idea below.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve? Is your request related to a frustration or gap?
    validations:
      required: true
  - type: dropdown
    id: workspace
    attributes:
      label: Affected workspace
      description: Which part of the monorepo would this affect?
      options:
        - quarkus-srv (Integration)
        - ecm-srv (Coordinator)
        - turbo-repo (Frontend)
        - miot-harness (AI harness)
        - Cross-cutting / not sure
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you would like to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or features you have considered.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, mockups, or references here.
    validations:
      required: false
