<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pipelineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0790ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6a14;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Data Sources -->
  <rect x="20" y="50" width="60" height="40" rx="8" fill="#f4f5f7" stroke="#0790ff" stroke-width="2"/>
  <text x="50" y="75" text-anchor="middle" font-family="Arial" font-size="10" fill="#0790ff">GPS</text>
  
  <rect x="20" y="110" width="60" height="40" rx="8" fill="#f4f5f7" stroke="#0790ff" stroke-width="2"/>
  <text x="50" y="135" text-anchor="middle" font-family="Arial" font-size="10" fill="#0790ff">Sensors</text>
  
  <rect x="20" y="170" width="60" height="40" rx="8" fill="#f4f5f7" stroke="#0790ff" stroke-width="2"/>
  <text x="50" y="195" text-anchor="middle" font-family="Arial" font-size="10" fill="#0790ff">Events</text>
  
  <!-- Pipeline -->
  <line x1="80" y1="70" x2="140" y2="70" stroke="url(#pipelineGradient)" stroke-width="3" filter="url(#glow)">
    <animate attributeName="stroke-dasharray" values="0,20;20,0;0,20" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="80" y1="130" x2="140" y2="130" stroke="url(#pipelineGradient)" stroke-width="3" filter="url(#glow)">
    <animate attributeName="stroke-dasharray" values="0,20;20,0;0,20" dur="2s" repeatCount="indefinite" begin="0.3s"/>
  </line>
  <line x1="80" y1="190" x2="140" y2="190" stroke="url(#pipelineGradient)" stroke-width="3" filter="url(#glow)">
    <animate attributeName="stroke-dasharray" values="0,20;20,0;0,20" dur="2s" repeatCount="indefinite" begin="0.6s"/>
  </line>
  
  <!-- Processing Hub -->
  <circle cx="170" cy="130" r="30" fill="#0790ff" opacity="0.8" filter="url(#glow)">
    <animate attributeName="r" values="30;35;30" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="170" y="135" text-anchor="middle" font-family="Arial" font-size="12" fill="white" font-weight="bold">Stream</text>
  
  <!-- Output Pipeline -->
  <line x1="200" y1="130" x2="280" y2="130" stroke="url(#pipelineGradient)" stroke-width="4" filter="url(#glow)">
    <animate attributeName="stroke-dasharray" values="0,30;30,0;0,30" dur="1.5s" repeatCount="indefinite"/>
  </line>
  
  <!-- Your Cloud -->
  <rect x="300" y="100" width="80" height="60" rx="12" fill="#ff6a14" opacity="0.9" filter="url(#glow)"/>
  <text x="340" y="125" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">Your</text>
  <text x="340" y="140" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">Cloud</text>
  
  <!-- Latency indicator -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial" font-size="14" fill="#0790ff" font-weight="bold">
    &lt; 56ms latency
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </text>
</svg> 