<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="background:#F9FAFB;">
  <div style="display:flex;gap:24px;justify-content:space-around;padding:12px 0;">
    <div style="text-align:center;"><div style="width:78px;height:78px;background:#fff;border-radius:8px;box-shadow:0 1px 2px 0 rgba(0,0,0,0.05);"></div><div style="font-size:10px;color:var(--fg-3);margin-top:10px;font-family:monospace;">xs</div></div>
    <div style="text-align:center;"><div style="width:78px;height:78px;background:#fff;border-radius:8px;box-shadow:0 1px 3px 0 rgba(0,0,0,0.10), 0 1px 2px 0 rgba(0,0,0,0.06);"></div><div style="font-size:10px;color:var(--fg-3);margin-top:10px;font-family:monospace;">sm · cards hover</div></div>
    <div style="text-align:center;"><div style="width:78px;height:78px;background:#fff;border-radius:8px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.10), 0 2px 4px -1px rgba(0,0,0,0.06);"></div><div style="font-size:10px;color:var(--fg-3);margin-top:10px;font-family:monospace;">md · popovers</div></div>
    <div style="text-align:center;"><div style="width:78px;height:78px;background:#fff;border-radius:8px;box-shadow:0 10px 15px -3px rgba(0,0,0,0.10), 0 4px 6px -2px rgba(0,0,0,0.05);"></div><div style="font-size:10px;color:var(--fg-3);margin-top:10px;font-family:monospace;">lg · modals</div></div>
    <div style="text-align:center;"><div style="width:78px;height:78px;background:#fff;border-radius:8px;box-shadow:0 0 10px rgba(225,29,72,0.6);"></div><div style="font-size:10px;color:#BE123C;margin-top:10px;font-family:monospace;font-weight:600;">pulse · alert</div></div>
  </div>
</div>
</body></html>
